<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="트로트 공연 무대 이미지">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#4c1d3d"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#db2777" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#sky)"/>
  <!-- 스포트라이트 빔 -->
  <polygon points="300,0 200,360 420,360" fill="#f9a8d4" opacity="0.10"/>
  <polygon points="600,0 470,360 730,360" fill="#fef08a" opacity="0.12"/>
  <polygon points="900,0 780,360 1000,360" fill="#a5b4fc" opacity="0.10"/>
  <rect width="1200" height="360" fill="url(#spot)"/>
  <!-- 무대 바닥 -->
  <rect y="300" width="1200" height="60" fill="#0f172a" opacity="0.6"/>
  <!-- 마이크 실루엣(가운데) -->
  <g fill="#0f172a" opacity="0.85" transform="translate(600,150)">
    <ellipse cx="0" cy="0" rx="26" ry="34"/>
    <rect x="-4" y="30" width="8" height="120" rx="4"/>
    <rect x="-28" y="296" width="56" height="10" rx="5"/>
  </g>
  <circle cx="600" cy="150" r="22" fill="none" stroke="#fbcfe8" stroke-width="2" opacity="0.5"/>
  <!-- 관객 실루엣 -->
  <g fill="#0f172a" opacity="0.7">
    <circle cx="120" cy="345" r="18"/><circle cx="180" cy="350" r="16"/><circle cx="240" cy="345" r="18"/>
    <circle cx="960" cy="345" r="18"/><circle cx="1020" cy="350" r="16"/><circle cx="1080" cy="345" r="18"/>
  </g>
</svg>
